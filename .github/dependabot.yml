version: 2
updates:
  # Go modules: one grouped PR for all updates to reduce churn.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      golang:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI/release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # Base image in the Dockerfile.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
