{{- $ds := .Values.datasource -}}
{{- $needDD := or (eq $ds.type "datadog") .Values.notifications.datadogEvent.enabled -}}
{{- if and $needDD (not $ds.datadog.existingSecret.name) $ds.datadog.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memreload.datadogSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memreload.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ $ds.datadog.apiKey | quote }}
  app-key: {{ $ds.datadog.appKey | quote }}
{{- end }}
{{- if and (eq $ds.type "prometheus") (not $ds.prometheus.existingSecret.name) $ds.prometheus.token }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memreload.prometheusSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memreload.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ $ds.prometheus.token | quote }}
{{- end }}
{{- $slack := .Values.notifications.slack -}}
{{- if and $slack.enabled (not $slack.existingSecret.name) (or $slack.botToken $slack.webhookUrl) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memreload.slackSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memreload.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $slack.botToken }}
  bot-token: {{ $slack.botToken | quote }}
  {{- end }}
  {{- if $slack.webhookUrl }}
  webhook-url: {{ $slack.webhookUrl | quote }}
  {{- end }}
{{- end }}
{{- if and (eq (include "memreload.routesEnabled" .) "true") (not .Values.notifications.routesExistingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memreload.routesSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memreload.labels" . | nindent 4 }}
type: Opaque
stringData:
  routes.json: {{ .Values.notifications.routes | toJson | quote }}
{{- end }}
