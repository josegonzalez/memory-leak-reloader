---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: memoryleakpolicies.memreload.io
spec:
  group: memreload.io
  names:
    kind: MemoryLeakPolicy
    listKind: MemoryLeakPolicyList
    plural: memoryleakpolicies
    shortNames:
    - mlp
    singular: memoryleakpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.workloadRef.kind
      name: Workload
      type: string
    - jsonPath: .spec.workloadRef.name
      name: Name
      type: string
    - jsonPath: .status.dryRun
      name: Dry-Run
      type: boolean
    - jsonPath: .status.restartCount
      name: Count
      type: integer
    - jsonPath: .status.breakerTripped
      name: Breaker
      type: boolean
    - jsonPath: .status.lastRestartAt
      name: Last-Restart
      type: date
    - jsonPath: .status.version
      name: Version
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MemoryLeakPolicy opts a single workload into memory-leak detection and carries
          the controller's durable per-workload state in its status.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MemoryLeakPolicySpec is the user-authored opt-in and tuning
              for one workload.
            properties:
              containerOverrides:
                description: ContainerOverrides tune detection per named container.
                items:
                  description: ContainerOverride applies detection overrides to a
                    single named container.
                  properties:
                    detection:
                      description: |-
                        DetectionSpec is the detection tuning for a policy or a per-container override.
                        Unset fields inherit the controller defaults (Helm values / flags).
                      properties:
                        mode:
                          enum:
                          - sustained
                          - trend
                          - combined
                          type: string
                        thresholdAbsolute:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        thresholdPercent:
                          maximum: 100
                          minimum: 1
                          type: integer
                        trendMinGrowth:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        window:
                          type: string
                      type: object
                    name:
                      minLength: 1
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 64
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              containers:
                description: |-
                  Containers is the requested monitor set. Empty means default selection; the
                  literal "*" element means all eligible containers.
                items:
                  type: string
                maxItems: 64
                type: array
              cooldown:
                type: string
              detection:
                description: |-
                  Detection is the policy-level detection tuning (per-container overrides in
                  ContainerOverrides take precedence).
                properties:
                  mode:
                    enum:
                    - sustained
                    - trend
                    - combined
                    type: string
                  thresholdAbsolute:
                    anyOf:
                    - type: integer
                    - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  thresholdPercent:
                    maximum: 100
                    minimum: 1
                    type: integer
                  trendMinGrowth:
                    anyOf:
                    - type: integer
                    - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  window:
                    type: string
                type: object
              dryRun:
                default: true
                description: |-
                  DryRun, when true (the default), makes the controller log/notify would-be
                  restarts for this workload without acting. Set false to enforce restarts.
                type: boolean
              maintenanceWindows:
                description: MaintenanceWindows restricts restarts to these windows
                  (empty = always).
                items:
                  description: |-
                    MaintenanceWindow is a recurring same-day allowed interval. Start and End are
                    "HH:MM" (Start < End; overnight windows are unsupported). Timezone is an IANA
                    name (empty means UTC); its shape is validated by schema, but its existence is
                    confirmed at runtime since OpenAPI/CEL have no timezone database.
                  properties:
                    days:
                      items:
                        description: Day is a weekday abbreviation used in maintenance
                          windows.
                        enum:
                        - Mon
                        - Tue
                        - Wed
                        - Thu
                        - Fri
                        - Sat
                        - Sun
                        type: string
                      maxItems: 7
                      minItems: 1
                      type: array
                      x-kubernetes-list-type: set
                    end:
                      maxLength: 5
                      pattern: ^([01][0-9]|2[0-3]):[0-5][0-9]$
                      type: string
                    start:
                      maxLength: 5
                      pattern: ^([01][0-9]|2[0-3]):[0-5][0-9]$
                      type: string
                    timezone:
                      maxLength: 64
                      pattern: ^(UTC|[A-Za-z]+(?:/[A-Za-z0-9_+-]+)+)$
                      type: string
                  required:
                  - days
                  - end
                  - start
                  type: object
                  x-kubernetes-validations:
                  - message: start must be before end (overnight windows unsupported)
                    rule: self.start < self.end
                maxItems: 24
                type: array
              notifyRoutes:
                description: |-
                  NotifyRoutes names notification routes to target (replaces the default
                  sinks). SlackChannel overrides the Slack channel (bot-token mode).
                items:
                  type: string
                maxItems: 32
                type: array
              pprofPath:
                maxLength: 256
                type: string
              profileCapture:
                description: 'ProfileCapture is a tri-state override: nil = inherit
                  the controller default.'
                type: boolean
              slackChannel:
                maxLength: 256
                type: string
              startupGrace:
                type: string
              workloadRef:
                description: WorkloadRef is the managed workload (resolved in the
                  policy's namespace).
                properties:
                  kind:
                    enum:
                    - Deployment
                    - StatefulSet
                    - Rollout
                    type: string
                  name:
                    maxLength: 253
                    minLength: 1
                    type: string
                required:
                - kind
                - name
                type: object
                x-kubernetes-validations:
                - message: workloadRef is immutable
                  rule: self == oldSelf
            required:
            - workloadRef
            type: object
          status:
            description: |-
              MemoryLeakPolicyStatus is the controller-managed durable state (folded from the
              former RestartState). The controller is the only writer.
            properties:
              breakerTripped:
                description: Computed observability, surfaced via printer columns.
                type: boolean
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              dryRun:
                description: DryRun is the effective mode resolved for this policy.
                type: boolean
              history:
                description: Bounded audit trail, newest last, capped at RestartHistoryLimit.
                items:
                  description: RestartRecord is one entry in the bounded restart audit
                    trail.
                  properties:
                    completedAt:
                      description: CompletedAt is set when the rollout settles, fails,
                        or times out.
                      format: date-time
                      type: string
                    container:
                      type: string
                    detectionMode:
                      type: string
                    observed:
                      format: int64
                      type: integer
                    outcome:
                      type: string
                    threshold:
                      format: int64
                      type: integer
                    triggeredAt:
                      format: date-time
                      type: string
                    version:
                      type: string
                  required:
                  - container
                  - triggeredAt
                  type: object
                type: array
              inFlight:
                description: In-flight rollout (deterministic leader failover).
                properties:
                  dispatchedAt:
                    format: date-time
                    type: string
                  dispatchedVersion:
                    type: string
                  phase:
                    type: string
                required:
                - dispatchedAt
                - dispatchedVersion
                type: object
              lastNotification:
                description: NotificationRef records the last notification emitted,
                  for failover-safe dedup.
                properties:
                  event:
                    type: string
                  notifiedAt:
                    format: date-time
                    type: string
                required:
                - notifiedAt
                type: object
              lastProfile:
                description: Diagnostic links.
                properties:
                  capturedAt:
                    format: date-time
                    type: string
                  url:
                    type: string
                required:
                - capturedAt
                type: object
              lastRestartAt:
                description: Circuit-breaker bookkeeping.
                format: date-time
                type: string
              nextEligibleRestart:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              restartCount:
                type: integer
              restartsRemaining:
                type: integer
              version:
                type: string
              windowStart:
                format: date-time
                type: string
              workloadUID:
                description: |-
                  WorkloadUID is the observed UID of the managed workload; a change (delete +
                  recreate under the same name) resets the persisted breaker bookkeeping.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
